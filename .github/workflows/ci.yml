name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  managed:
    name: Managed build and tests
    runs-on: ubuntu-24.04
    env:
      FEATHER_NATIVE_CMAKE_ARGS: -DEASYGPU_ENABLE_SPIRV_OPT=ON -DEASYGPU_ENABLE_SPIRV_CROSS_GLSL=OFF
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Feather.slnx

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            glslang-dev \
            glslang-tools \
            libgl1-mesa-dev \
            libssl-dev \
            libvulkan-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            mesa-vulkan-drivers \
            spirv-cross \
            spirv-tools \
            vulkan-tools

      - name: Build native runtime
        run: ./eng/build-native.sh

      - name: Stage native assets
        run: ./eng/stage-native-assets.sh

      - name: Check native contract export
        run: ./eng/check-native-export.sh artifacts/native-assets/runtimes/linux-x64/native/libfeather.so

      - name: Build
        run: dotnet build Feather.slnx --no-restore -v minimal

      - name: Test managed contracts
        run: ./eng/test.sh

      - name: Enforce managed AD coverage
        run: python3 scripts/ad-coverage-gate.py
        env:
          FEATHER_NATIVE_LIBRARY: ${{ github.workspace }}/artifacts/native-assets/runtimes/linux-x64/native/libfeather.so

      - name: Enforce NN device paths
        run: python3 scripts/nn-industrial-gate.py
        env:
          FEATHER_NATIVE_LIBRARY: ${{ github.workspace }}/artifacts/native-assets/runtimes/linux-x64/native/libfeather.so

      - name: Check markdown links
        run: ./eng/check-markdown-links.py

      - name: Pack
        run: ./eng/pack.sh

  native-smoke:
    name: Native smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      FEATHER_NATIVE_CMAKE_ARGS: -DEASYGPU_ENABLE_SPIRV_OPT=ON -DEASYGPU_ENABLE_SPIRV_CROSS_GLSL=OFF
      FEATHER_NATIVE_CONFIGURATION: Release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301
          global-json-file: global.json

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            glslang-dev \
            glslang-tools \
            libgl1-mesa-dev \
            libssl-dev \
            libvulkan-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            spirv-cross \
            spirv-tools \
            vulkan-tools

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            glslang \
            openssl@3 \
            spirv-tools \
            vulkan-loader
          echo "FEATHER_NATIVE_CMAKE_ARGS=${FEATHER_NATIVE_CMAKE_ARGS} -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Install Windows Vulkan SDK components
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.304.1
          vulkan-components: Vulkan-Headers, Vulkan-Loader, SPIRV-Headers, SPIRV-Tools, Glslang
          vulkan-use-cache: true

      - name: Check Linux Vulkan toolchain
        if: runner.os == 'Linux'
        run: |
          ldconfig -p | grep -E 'libvulkan|libglslang|libSPIRV|libspirv-cross' || true
          test -e /usr/include/vulkan/vulkan.h
          test -e /usr/lib/x86_64-linux-gnu/libvulkan.so

      - name: Check macOS Vulkan toolchain
        if: runner.os == 'macOS'
        run: |
          test -e "$(brew --prefix vulkan-headers)/include/vulkan/vulkan.h"
          test -e "$(brew --prefix vulkan-loader)/lib/libvulkan.dylib"
          test -e "$(brew --prefix openssl@3)/lib/libcrypto.dylib"

      - name: Check Windows Vulkan toolchain
        if: runner.os == 'Windows'
        shell: bash
        run: |
          test -n "${VULKAN_SDK:-}"
          find "$VULKAN_SDK" -maxdepth 4 -iname vulkan.h -print -quit | grep .
          find "$VULKAN_SDK" -maxdepth 4 \( -iname vulkan-1.lib -o -iname vulkan.lib \) -print -quit | grep .

      - name: Build native runtime
        shell: bash
        run: ./eng/build-native.sh

      - name: Stage native assets
        shell: bash
        run: ./eng/stage-native-assets.sh

      - name: Check native contract export
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux) rid=linux-x64; library=libfeather.so ;;
            macOS) rid=osx-arm64; library=libfeather.dylib ;;
            Windows) rid=win-x64; library=feather_native.dll ;;
          esac
          ./eng/check-native-export.sh "artifacts/native-assets/runtimes/$rid/native/$library"

      - name: Build solution
        shell: bash
        run: dotnet build Feather.slnx -v minimal
